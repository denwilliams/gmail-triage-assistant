name = "gmail-triage-assistant"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[assets]
directory = "../frontend/dist"

[[d1_databases]]
binding = "DB"
database_name = "gmail-assistant"
database_id = "placeholder"

[[queues.producers]]
queue = "gmail-assistant-processing"
binding = "EMAIL_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-background-jobs"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "gmail-assistant-processing"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-background-jobs"
max_batch_size = 1
max_retries = 3

[triggers]
crons = [
  "*/5 * * * *",
  "0 8 * * *",
  "0 17 * * *",
  "0 18 * * 6",
  "0 19 1 * *",
  "0 20 1 1 *"
]
