name = "gmail-assistant"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

[assets]
directory = "../frontend/dist"
html_handling = "drop-trailing-slash"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
GOOGLE_REDIRECT_URL = "https://gmail-assistant.loke.tools/auth/callback"
OPENAI_MODEL = "gpt-5-nano"
OPENAI_BASE_URL = "https://api.openai.com/v1"
SERVER_URL = "https://gmail-assistant.loke.tools"

[[d1_databases]]
binding = "DB"
database_name = "gmail-assistant"
database_id = "05a94f76-e07f-45cc-83c3-b5829aaa6479"

[[queues.producers]]
queue = "gmail-assistant-processing"
binding = "EMAIL_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-background-jobs"
binding = "BACKGROUND_QUEUE"

[[queues.consumers]]
queue = "gmail-assistant-processing"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-background-jobs"
max_batch_size = 1
max_retries = 3

[triggers]
crons = [
  "*/5 * * * *",
  "0 8 * * *",
  "0 17 * * *",
  "0 18 * * 6",
  "0 19 1 * *",
  "0 20 1 1 *"
]
