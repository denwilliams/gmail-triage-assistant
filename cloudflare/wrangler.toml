name = "gmail-assistant"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false
preview_urls = false

[assets]
directory = "../frontend/dist"
html_handling = "drop-trailing-slash"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
GOOGLE_REDIRECT_URL = "https://gmail-assistant.loke.tools/auth/callback"
OPENAI_MODEL = "gpt-5-nano"
OPENAI_BASE_URL = "https://api.openai.com/v1"
SERVER_URL = "https://gmail-assistant.loke.tools"
TIMEZONE = "Australia/Sydney"

# Per-stage model overrides. Unset → falls back to OPENAI_MODEL. Easy to A/B
# swap models without code changes.
# OPENAI_MODEL_TRIAGE        = "gpt-5-nano"
# OPENAI_MODEL_NEWSLETTER    = "gpt-5-nano"
# OPENAI_MODEL_NOTIFICATION  = "gpt-5-nano"
# OPENAI_MODEL_HUMAN         = "gpt-5-mini"
# OPENAI_MODEL_TRANSACTIONAL = "gpt-5-nano"
# OPENAI_MODEL_SECURITY      = "gpt-5-nano"
# OPENAI_MODEL_CALENDAR      = "gpt-5-nano"
# OPENAI_MODEL_SUMMARY       = "gpt-5-nano"
# OPENAI_MODEL_SENDER_RATING = "gpt-5-nano"

[[d1_databases]]
binding = "DB"
database_name = "gmail-assistant"
database_id = "05a94f76-e07f-45cc-83c3-b5829aaa6479"

# ----------------------------------------------------------------------------
# Queues — pipeline
# ----------------------------------------------------------------------------
[[queues.producers]]
queue = "gmail-assistant-triage"
binding = "TRIAGE_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-newsletter"
binding = "BUCKET_NEWSLETTER_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-notification"
binding = "BUCKET_NOTIFICATION_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-human"
binding = "BUCKET_HUMAN_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-transactional"
binding = "BUCKET_TRANSACTIONAL_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-security"
binding = "BUCKET_SECURITY_QUEUE"

[[queues.producers]]
queue = "gmail-assistant-bucket-calendar"
binding = "BUCKET_CALENDAR_QUEUE"

[[queues.consumers]]
queue = "gmail-assistant-triage"
max_batch_size = 10
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-newsletter"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-notification"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-human"
max_batch_size = 3
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-transactional"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-security"
max_batch_size = 5
max_retries = 3

[[queues.consumers]]
queue = "gmail-assistant-bucket-calendar"
max_batch_size = 5
max_retries = 3

# Cron triggers
# ----------------------------------------------------------------------------
# Only two crons — the hourly dispatcher handles daily/weekly/monthly/yearly
# jobs by converting "now" to the user-configured TIMEZONE (defaults to UTC)
# and firing whichever jobs are due this hour. Most hours are no-ops.
#
# Scheduled local-time jobs:
#   - 03:00 local — sender rating sweep
#   - 00:00 / 06:00 / 12:00 / 18:00 local — timed label sweep
#   - 08:00 local — morning wrapup + daily digest
#   - 17:00 local — evening wrapup + daily memory
#   - 18:00 Sat local — weekly memory + AI prompt generation
#   - 19:00 on 1st local — monthly memory
#   - 20:00 on 1 Jan local — yearly memory
[triggers]
crons = [
  "*/15 * * * *",
  "0 * * * *",
]
